name: CI

"on":
  workflow_call:
  push:
    branches:
      - main
  pull_request:

env:
  UV_VERSION: "0.11.x"
  UV_MANAGED_PYTHON: "1"

jobs:
  commitlint:
    uses: tcjennings/actions-workflows/.github/workflows/commitlint.yaml@main
    with:
      verbose: true

  lint:
    needs: commitlint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        nicegui-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # 7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run Linters
        uses: j178/prek-action@e98a699c41eb69ab013a45817a0406469a748f8d  # v2.0.5

      - name: Type check with mypy
        run: uv run --with "nicegui==${{ matrix.nicegui-version }}.*" --isolated mypy -p nice_dialogs

  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13", "3.14"]
        nicegui-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # 7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Install NiceGUI
        run: uv pip install "nicegui==${{ matrix.nicegui-version }}.*"

      - name: Run tests
        run: uv run pytest
